<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErCa AI Chat</title>

    <link rel="stylesheet" href="css/chat.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="sidebar">

    <h2><i class="fa-solid fa-robot"></i> ErCa AI</h2>

    <button id="newChat">
        <i class="fa-solid fa-plus"></i>
        Nuevo Chat
    </button>

    <ul>

        <li><i class="fa-solid fa-message"></i> Conversación 1</li>

        <li><i class="fa-solid fa-message"></i> Conversación 2</li>

    </ul>

</div>

<div class="chat-container">

    <div class="topbar">

        <h2>ErCa AI</h2>

    </div>

    <div class="chat-box" id="chatBox">

        <div class="bot">

            <i class="fa-solid fa-robot"></i>

            <div class="message">

                Hola 👋 Soy ErCa AI. ¿Cómo puedo ayudarte?

            </div>

        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="userInput"
        placeholder="Escribe un mensaje...">

        <button id="sendBtn">

            <i class="fa-solid fa-paper-plane"></i>

        </button>

    </div>

</div>

<script src="js/chat.js"></script>

</body>
</html>
